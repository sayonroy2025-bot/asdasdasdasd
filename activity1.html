<!DOCTYPE html>
<html>
    <head>
        <title>To do list</title>
        <style>
            body {
                font-family: Arial;
                background: #f2f2f2;
                text-align: center;
            }
            .box {
                background: #fff;
                width: 260px;
                margin: 50px auto;
                padding: 15px;
                border-radius: 15px;
            }
            button {
                background: green;
                color: white;
                border: none;
                width: 50px;
                height: 20px;
                border-radius: 10px;
            }
        </style>
        </head>
        <body>
            <div class="box">
                <h3>To do list</h3>
                <form id ="myForm">
                    <input id="myInput" type="text" placeholder="enter task">
                    <button>Add</button>
                </form>
                <ul id="myItem"></ul>
            </div>
            <Script src="script.js"></Script>
        </body>
